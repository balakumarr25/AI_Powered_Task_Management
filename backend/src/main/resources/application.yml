spring:
  application:
    name: task-portal
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-at-least-32-characters-long-for-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    provider: ${AI_PROVIDER:huggingface}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.0-flash}
    huggingface-api-key: ${HUGGINGFACE_API_KEY:}
    huggingface-model: ${HUGGINGFACE_MODEL:Qwen/Qwen2.5-7B-Instruct}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
